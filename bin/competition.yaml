      - matching_content: "SUCCESS"
        properties:
        - name: commands
          value: whoami
    - name: VNC-Ballast
      check_name: VNCCheck
      host: 10.1.2.12
      port: 5901
      points: 100
      accounts:
      - username: SeaScourge30
        password: Passw0rd123!
      environments:
      - matching_content: ACCOUNT FOUND
    - name: SMTP-Courier
      check_name: SMTPCheck
      host: mail1.ccso.org
      port: 587
      points: 100
      accounts:
      - username: admiralnelson@ccso.org
        password: Passw0rd123!
